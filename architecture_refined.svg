<svg width="900" height="500" viewBox="0 0 900 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Container background and border simulation -->
  <rect x="0" y="0" width="900" height="500" rx="3" fill="#fafaf8" stroke="#c8c4b8" stroke-width="1"/>
  
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&amp;display=swap');
      .label { font-family: 'EB Garamond', Georgia, serif; font-size: 12px; fill: #2d2a26; }
      .edge-label { font-family: 'EB Garamond', Georgia, serif; font-size: 10px; font-style: italic; fill: #6b6860; }
      .subgraph-label { font-family: 'EB Garamond', Georgia, serif; font-size: 10px; font-variant: small-caps; fill: #6b6860; }
      .caption { font-family: 'EB Garamond', Georgia, serif; font-size: 12px; font-style: italic; fill: #6b6860; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2d2a26" />
    </marker>
  </defs>

  <!-- SUBGRAPH: CLIENT -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="220" height="340" rx="3" fill="none" stroke="#9a9690" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="0" y="-8" class="subgraph-label">CLIENT INTERFACE</text>
    
    <!-- Astro Node (Blue) -->
    <rect x="20" y="30" width="180" height="40" rx="3" fill="#f2f4fa" stroke="#607aaa" stroke-width="1.2"/>
    <text x="110" y="50" class="label" text-anchor="middle" dominant-baseline="middle">Astro Static Layer</text>
    
    <!-- React Islands (Purple) -->
    <rect x="20" y="100" width="180" height="120" rx="3" fill="#f7f2fa" stroke="#9070b0" stroke-width="1.2"/>
    <text x="110" y="120" class="label" text-anchor="middle" dominant-baseline="middle">Interactive Islands</text>
    
    <g transform="translate(30, 140)">
      <rect width="75" height="28" rx="3" fill="#f4f3f0" stroke="#9a9690" stroke-width="1"/>
      <text x="37.5" y="14" class="label" font-size="10" text-anchor="middle" dominant-baseline="middle">Dashboard</text>
    </g>
    <g transform="translate(115, 140)">
      <rect width="75" height="28" rx="3" fill="#f4f3f0" stroke="#9a9690" stroke-width="1"/>
      <text x="37.5" y="14" class="label" font-size="10" text-anchor="middle" dominant-baseline="middle">Booking UI</text>
    </g>
    <g transform="translate(30, 178)">
      <rect width="160" height="28" rx="3" fill="#f4f3f0" stroke="#9a9690" stroke-width="1"/>
      <text x="80" y="14" class="label" font-size="10" text-anchor="middle" dominant-baseline="middle">Auth State / LocalStore</text>
    </g>

    <rect x="20" y="260" width="180" height="40" rx="3" fill="#f4f3f0" stroke="#9a9690" stroke-width="1.2"/>
    <text x="110" y="280" class="label" text-anchor="middle" dominant-baseline="middle">Tailwind / Bricolage</text>
  </g>

  <!-- CONNECTION 1 -->
  <path d="M260 210 L330 210" stroke="#2d2a26" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <text x="295" y="200" class="edge-label" text-anchor="middle">Axios / JSON</text>

  <!-- SUBGRAPH: BACKEND -->
  <g transform="translate(340, 60)">
    <rect x="0" y="0" width="220" height="340" rx="3" fill="none" stroke="#9a9690" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="0" y="-8" class="subgraph-label">APPLICATION LOGIC</text>
    
    <!-- Express Server (Amber) -->
    <rect x="20" y="30" width="180" height="40" rx="3" fill="#faf5ee" stroke="#c09050" stroke-width="1.2"/>
    <text x="110" y="50" class="label" text-anchor="middle" dominant-baseline="middle">Node.js / Express</text>
    
    <!-- Middleware (Amber) -->
    <rect x="20" y="100" width="180" height="80" rx="3" fill="#faf5ee" stroke="#c09050" stroke-width="1.2"/>
    <text x="110" y="120" class="label" text-anchor="middle" dominant-baseline="middle">Safety Guards</text>
    <text x="110" y="145" class="label" font-size="10" text-anchor="middle">RBAC Middleware</text>
    <text x="110" y="160" class="label" font-size="10" text-anchor="middle">Error Handling</text>

    <!-- Connection Pool (Amber) -->
    <rect x="20" y="210" width="180" height="40" rx="3" fill="#faf5ee" stroke="#c09050" stroke-width="1.2"/>
    <text x="110" y="230" class="label" text-anchor="middle" dominant-baseline="middle">mysql2 Pool</text>

    <!-- Decision Diamond -->
    <g transform="translate(110, 290)">
      <polygon points="0,-25 40,0 0,25 -40,0" fill="#f4f3f0" stroke="#9a9690" stroke-width="1.2"/>
      <text x="0" y="-4" class="label" font-size="11" text-anchor="middle">Valid</text>
      <text x="0" y="8" class="label" font-size="11" text-anchor="middle">Query?</text>
    </g>
  </g>

  <!-- CONNECTION 2 -->
  <path d="M560 210 L630 210" stroke="#2d2a26" stroke-width="1.3" marker-end="url(#arrowhead)"/>
  <text x="595" y="200" class="edge-label" text-anchor="middle">Raw SQL Strings</text>

  <!-- SUBGRAPH: DATABASE -->
  <g transform="translate(640, 60)">
    <rect x="0" y="0" width="220" height="340" rx="3" fill="none" stroke="#9a9690" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="0" y="-8" class="subgraph-label">PERSISTENCE LAYER</text>
    
    <!-- MySQL (Green) -->
    <rect x="20" y="30" width="180" height="40" rx="3" fill="#f2f7f2" stroke="#5a8a5a" stroke-width="1.2"/>
    <text x="110" y="50" class="label" text-anchor="middle" dominant-baseline="middle">MySQL 8.0</text>
    
    <!-- Triggers/Views (Green) -->
    <rect x="20" y="100" width="180" height="180" rx="3" fill="#f2f7f2" stroke="#5a8a5a" stroke-width="1.2"/>
    <text x="110" y="125" class="label" font-weight="bold" text-anchor="middle">Active Intelligence</text>
    
    <g transform="translate(40, 150)">
      <circle cx="5" cy="5" r="3" fill="#5a8a5a"/>
      <text x="15" y="8" class="label" font-size="10">Check-in Triggers</text>
      
      <circle cx="5" cy="35" r="3" fill="#5a8a5a"/>
      <text x="15" y="38" class="label" font-size="10">Financial Auto-Bills</text>
      
      <circle cx="5" cy="65" r="3" fill="#5a8a5a"/>
      <text x="15" y="68" class="label" font-size="10">Occupancy Views</text>
      
      <circle cx="5" cy="95" r="3" fill="#5a8a5a"/>
      <text x="15" y="98" class="label" font-size="10">Unique Constraints</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="450" y="470" class="caption" text-anchor="middle">Figure 1. Operational flow of the Grand Stay system, showing the transition from static Astro layouts to reactive SQL persistence.</text>

</svg>
