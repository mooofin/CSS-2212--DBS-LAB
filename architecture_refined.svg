<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #333333; stroke-width: 1; }
      .label { font-family: Times, serif; font-size: 12px; fill: #000000; }
      .title { font-family: Times, serif; font-size: 11px; font-weight: bold; fill: #000000; }
      .arrow { stroke: #333333; stroke-width: 1; fill: none; marker-end: url(#arrow); }
      .layer-box { fill: none; stroke: #666666; stroke-width: 1; stroke-dasharray: 4,2; }
      .caption { font-family: Times, serif; font-size: 10px; fill: #666666; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#333333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- Layer 1: Presentation -->
  <rect x="50" y="50" width="200" height="280" class="layer-box"/>
  <text x="50" y="40" class="title">Presentation Layer</text>

  <rect x="70" y="70" width="160" height="35" class="box"/>
  <text x="150" y="92" class="label" text-anchor="middle">React (Vite)</text>

  <rect x="70" y="120" width="160" height="35" class="box"/>
  <text x="150" y="142" class="label" text-anchor="middle">Tailwind CSS</text>

  <rect x="70" y="170" width="160" height="70" class="box"/>
  <text x="150" y="195" class="label" text-anchor="middle">Dual Portal</text>
  <text x="150" y="215" class="caption" text-anchor="middle">Staff / Guest</text>
  <text x="150" y="228" class="caption" text-anchor="middle">LocalStorage Auth</text>

  <!-- Layer 2: Application -->
  <rect x="300" y="50" width="200" height="280" class="layer-box"/>
  <text x="300" y="40" class="title">Application Layer</text>

  <rect x="320" y="70" width="160" height="35" class="box"/>
  <text x="400" y="92" class="label" text-anchor="middle">Express.js</text>

  <rect x="320" y="120" width="160" height="80" class="box"/>
  <text x="400" y="145" class="label" text-anchor="middle">REST Endpoints</text>
  <text x="400" y="165" class="caption" text-anchor="middle">/rooms, /bookings</text>
  <text x="400" y="180" class="caption" text-anchor="middle">/auth, /billing</text>
  <text x="400" y="195" class="caption" text-anchor="middle">/guests, /staff</text>

  <rect x="320" y="215" width="160" height="35" class="box"/>
  <text x="400" y="237" class="label" text-anchor="middle">mysql2 Connection Pool</text>

  <!-- Layer 3: Data -->
  <rect x="550" y="50" width="200" height="280" class="layer-box"/>
  <text x="550" y="40" class="title">Data Layer</text>

  <rect x="570" y="70" width="160" height="35" class="box"/>
  <text x="650" y="92" class="label" text-anchor="middle">MySQL 8.0</text>

  <rect x="570" y="120" width="160" height="180" class="box"/>
  <text x="650" y="145" class="label" text-anchor="middle">Schema Objects</text>
  <text x="650" y="170" class="caption" text-anchor="middle">Tables: rooms, guests,</text>
  <text x="650" y="185" class="caption" text-anchor="middle">bookings, billing, staff</text>
  <text x="650" y="210" class="caption" text-anchor="middle">Triggers: auto-billing,</text>
  <text x="650" y="225" class="caption" text-anchor="middle">room status updates</text>
  <text x="650" y="250" class="caption" text-anchor="middle">Views: availability,</text>
  <text x="650" y="265" class="caption" text-anchor="middle">revenue, occupancy</text>

  <!-- Arrows -->
  <line x1="250" y1="175" x2="320" y2="175" class="arrow"/>
  <text x="285" y="165" class="caption" text-anchor="middle">HTTP/JSON</text>

  <line x1="480" y1="175" x2="570" y2="175" class="arrow"/>
  <text x="525" y="165" class="caption" text-anchor="middle">SQL</text>

  <!-- Figure caption -->
  <text x="400" y="360" class="caption" text-anchor="middle">
    Figure 1. Three-tier architecture of the Grand Stay system.
  </text>
  <text x="400" y="375" class="caption" text-anchor="middle">
    Business logic implemented via database triggers and views.
  </text>

</svg>